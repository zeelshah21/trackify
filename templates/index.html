<!DOCTYPE html>
<html>
<head>
    <title>Trackify</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: linear-gradient(to right, #d6ccc2, #ede0d4);
        }

        /* HEADER */
        .header {
            text-align: center;
            padding: 25px 0 5px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            color: #5a3e36;
            margin: 0;
        }

        .header p {
            margin: 5px 0 0;
            font-size: 14px;
            color: #6c584c;
        }

        /* BUTTONS */
        .actions {
            text-align: center;
            margin-top: 25px;   /* 👈 pushed slightly DOWN */
            margin-bottom: 10px; /* 👈 tighter gap with card */
        }

        .btn {
            padding: 12px 22px;
            margin: 6px;
            font-size: 15px;
            font-weight: 500;
            border: none;
            border-radius: 12px;
            background: #a98467;
            color: white;
            cursor: pointer;

            /* ✨ subtle shadow */
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);

            /* ✨ smooth animation */
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: #7f5539;

            /* ✨ lift effect */
            transform: translateY(-2px);

            /* ✨ stronger shadow */
            box-shadow: 0 6px 14px rgba(0,0,0,0.2);
        }

        /* MAIN */
        .container {
            max-width: 800px;
            margin: 10px auto; /* 👈 reduced gap */
            padding: 20px;
            text-align: center;
        }

        /* TOTAL CARD */
        .card {
            background: #f5ebe0;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            margin: 0 auto 15px;
            max-width: 600px;
        }

        .card h3 {
            font-family: 'Playfair Display', serif;
            color: #5a3e36;
            margin: 0;
        }

        .card h1 {
            margin: 10px 0 0;
            color: #5a3e36;
            font-size: 32px;
        }

        /* TABLE CARD */
        .table-card {
            background: #f5ebe0;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }

        .section-title {
            text-align: center;
            margin-bottom: 10px;
            color: #5a3e36;
            font-family: 'Playfair Display', serif;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fffaf5;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #e6d5c3;
            padding: 12px;
            color: #5a3e36;
            text-align: left;
        }

        td {
            padding: 12px;
            color: #6c584c;
        }

        tr:nth-child(even) {
            background: #f9f3ed;
        }

        tr:hover {
            background: #efe6dd;
        }

        .delete-btn {
            background: #9c6644;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        .delete-btn:hover {
            background: #7f5539;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <h1>Trackify</h1>
        <p>Know where your money goes.</p>
    </div>

    <!-- BUTTONS -->
    <div class="actions">
        <a href="/add"><button class="btn">Add Expense</button></a>
        <a href="/analytics"><button class="btn">Analytics</button></a>
    </div>

    <div class="container">

        <!-- TOTAL -->
        <div class="card">
            <h3>Total Spent</h3>
            <h1>${{ "%.2f"|format(total) }}</h1>
        </div>

        <!-- TABLE -->
        <div class="table-card">
            <h3 class="section-title">Recent Expenses</h3>

            <table>
                <tr>
                    <th>Amount</th>
                    <th>Category</th>
                    <th>Date</th>
                    <th></th>
                </tr>

                {% for exp in expenses %}
                <tr>
                    <td>${{ "%.2f"|format(exp[1]) }}</td>
                    <td>{{ exp[2] }}</td>
                    <td>{{ exp[3] }}</td>
                    <td>
                        <a href="/delete/{{ exp[0] }}">
                            <button class="delete-btn">Delete</button>
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </table>
        </div>

    </div>

</body>
</html>
