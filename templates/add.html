<!DOCTYPE html>
<html>
<head>
    <title>Add Expense</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: linear-gradient(to right, #d6ccc2, #ede0d4);
        }

        /* HEADER */
        .header {
            text-align: center;
            padding: 25px 0 5px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            color: #5a3e36;
            margin: 0;
        }

        .header p {
            margin: 5px 0 0;
            font-size: 14px;
            color: #6c584c;
        }

        /* FORM CARD */
        .card {
            max-width: 400px;
            margin: 40px auto;
            background: #f5ebe0;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: #5a3e36;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #d6ccc2;
            font-size: 14px;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #a98467;
            color: white;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: all 0.2s ease;
        }

        .submit-btn:hover {
            background: #7f5539;
            transform: translateY(-2px);
        }

        /* HOME BUTTON (SUBTLE) */
        .home-btn {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: transparent;
            color: #7f5539;
            font-size: 14px;
            cursor: pointer;
        }

        .home-btn:hover {
            text-decoration: underline;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <h1>Trackify</h1>
        <p>Know where your money goes.</p>
    </div>

    <!-- FORM -->
    <div class="card">
        <h2>Add Expense</h2>

        <form method="POST">
            <input type="number" step="0.01" name="amount" placeholder="Amount" required>

            <select name="category">
                <option>Food</option>
                <option>Transport</option>
                <option>Shopping</option>
                <option>Other</option>
            </select>

            <input type="date" name="date" required>

            <button type="submit" class="submit-btn">Save Expense</button>
        </form>

        <!-- BACK BUTTON -->
        <a href="/">
            <button class="home-btn">← Back to Home</button>
        </a>
    </div>

</body>
</html>
